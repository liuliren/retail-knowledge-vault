# goldmine 客户配置模板（tracked·纯占位·SENSITIVE-PRIVATE-003 方案B+）
# 用法：复制本模板到 gitignored 私有区,填真实值,绝不提交真实配置。
#   _client_private/<client_name>/goldmine/client_config_<client_name>_goldmine.yaml
# 运行：--config <私有yaml> 或 export GOLDMINE_CONFIG=<私有yaml>
# 禁止：本模板不得写真实路径/真实客户名/真实文件名/真实数据值。

client_name: "<client_name>"                 # 输出文件名前缀用
input_dir: "<path_to_client_raw_dir>"        # 客户原始数据目录(gitignored)
processed_subdir: "processed"                # 输出子目录(在 input_dir 下)
backbone_glob: "<sales_summary_90d_glob>"    # 主干销售汇总文件名通配
archive_glob: "<product_archive_glob>"       # 商品档案文件名通配
slow_glob: "<slow_or_inventory_glob>"        # 滞销/库存文件名通配
fresh_archive_glob: "<fresh_archive_glob>"   # 生鲜档案/客户级排除来源(§3.1.3 client_specific)
output_prefix: "<client_name>_90天"          # 各明细/结果表前缀

# 金矿口径参数(§3.1.1/3.1.2,通用,可留默认)
goldmine:
  sales_window_days: 90
  min_recent_sales_qty: 4          # 动销闸:近窗口销量≥此值
  high_margin_quantile: 0.75       # 毛利率分层 P75(不上 P85)
  old_inventory_age_days: 90       # old_inventory_risk 阈值(库龄>此值)
