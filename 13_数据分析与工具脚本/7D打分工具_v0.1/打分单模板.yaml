# =============================================================================
# 7D 现场打分单模板 v0.1 (draft)
# 用法: 复制本文件 → 到店逐项填 score/evidence/note → python3 score_7d.py <文件>
#
# 打分口径 (来源 KB-DX-FULLSTORE-001 §3 各维⑤评分方法·满分锚点):
#   score: 0-5 整数或小数; 5=完全达到该子项满分锚点, 3=基本达标有缺口,
#          0=严重失守; 不采集/无数据 → 整个子项留空(删掉 score/evidence 行即可)
#   evidence: A-E 证据分级 (§7·按交叉验证深度, 非来源类型):
#     A = 数据+现场+人工确认三重一致 (可写正式结论)
#     B = 数据+现场二源支持 (初步判断, 标"基于X数据")
#     C = 数据单项(如仅POS未交叉) 或 仅访谈/主观观察 (待验证假设·禁精确%)
#     D = 现场单项/未充分验证 (仅内部待办)
#     E = 经验判断/顾问直觉 (禁写成结论)
#     ⚠ POS 单源导出 = C 级(不是A)! 加现场核验交叉才升 B。
#   note: 证据一句话 (观察→锚点→判定, 写"看到什么", 不写形容词)
#
# 纪律: C/D/E 级维度输出只给档位(强/中偏强/中/中偏弱/弱), 禁写假精确%。
#       打分裁量在六哥; 工具只算加权。override_grade 为六哥裁量覆盖位。
# =============================================================================

meta:
  store_code: 门店代号         # 用代号! 不写真实客户名(客户机密铁律)
  date: 2026-01-01
  scorer: 六哥
  fresh_ratio:                 # POS生鲜占比f(0-1小数,如0.42); 留空=用固定权重
  employee_mode: full          # full=雇员≥5 / gray=1-4雇员(D6=5) / none=夫妻店(D6=0并入D2/D5)

dimensions:

  D1:   # 商品力(品类结构) · 基础权重20 · POS单源=C级,加现场核验升B
    # override_grade: B        # 可选:六哥裁量覆盖本维证据级(默认取子项最弱级)
    items:
      D1-1:                    # ABC-Z结构: A类占最佳位? Z类(3月0动销)占比?
        score:                 # 5=A类占好位且Z类≈0; 0=尾部臃肿A类被挤
        evidence:
        note: ""
      D1-2:                    # 五态宽度: "真实SKU=0且下限≥8"的空缺-紧急品类数
        score:                 # 5=无空缺紧急; 0=多个核心品类空缺
        evidence:
        note: ""
      D1-3:                    # 价格带: 大众/主流/高端三档齐? 有无空档/过密?
        score:                 # 5=三档齐无空档; 0=断档或中价过密
        evidence:
        note: ""
      D1-4:                    # CR5: 前5品牌销售占比过高=品牌遮蔽
        score:                 # 5=集中度健康; 0=被大牌绑架
        evidence:
        note: ""
      D1-5:                    # 空销率: 30天0动销SKU÷在档SKU, 锚点<30%
        score:                 # 5=远低于30%; 0=大幅超标
        evidence:
        note: ""

  D2:   # 生鲜运营 · 基础权重25(最高·护城河) · 现场核查可达B级
    items:
      D2-1:                    # 生鲜占比f: ≥40稳固/30-40待改善/<30失守
        score:
        evidence:              # POS单源=C; POS+现场观感=B
        note: ""
      D2-2:                    # 肉类日清: 阶梯打折标签(下午4点7-8折→打烊5折)? 隔夜肉?
        score:                 # 现场可核→B级
        evidence:
        note: ""
      D2-3:                    # 品种结构: 叶菜≥10种/猪肉三档(白猪≥50%+黑猪+品牌猪)/清远鸡必备
        score:                 # 现场盘点→B级; 清远鸡缺=严重失分(大湾区横切)
        evidence:
        note: ""
      D2-4:                    # 损耗率: 叶菜≤8%/水果≤5%/肉≤5%; 多数店无台账→老板估算C级
        score:
        evidence:
        note: ""
      D2-5:                    # 生鲜毛利率: ⚠ERP进价常虚高, 用销售/动销口径, 上限C级
        score:
        evidence:              # 框架规定本项证据上限C, 禁作生鲜裁品A级依据
        note: ""

  D3:   # 陈列空间 · 基础权重10 · 现场观察为主B级
    items:
      D3-1:                    # 销售-陈列比错配: >1.5或<0.5的品类数
        score:                 # 5=无大错配; 0=强势品挤小空间普遍
        evidence:
        note: ""
      D3-2:                    # 黄金层(1.4-1.6m视线层)是否放A类而非促销/滞销品
        score:                 # 走店观察→B级
        evidence:
        note: ""
      D3-3:                    # 时间效率: 30秒找到率/5分钟采购完成比
        score:
        evidence:
        note: ""
      D3-4:                    # 端架/堆头: 推A类/季节品? 有无浪费在滞销品?
        score:
        evidence:
        note: ""

  D4:   # 客流人效 · 基础权重15 · ⚠整维证据上限通常C(无客流设备时)
    items:
      D4-1:                    # 客单数趋势(代理客流·非真实人次): POS订单数
        score:                 # POS单源=C级(§7语义映射)
        evidence:
        note: ""
      D4-2:                    # 增长归因: 客数驱动还是客单价驱动? 危险信号=客流降+客单价涨
        score:
        evidence:
        note: ""
      D4-3:                    # 时段分布: 高峰/平峰单量, 排班匹配高峰?
        score:                 # 高峰收银台排队目测=客流强信号(降级方案)
        evidence:
        note: ""
      D4-4:                    # 时段人效: 高峰(9-11点/16-18点)单量÷在岗人时
        score:
        evidence:
        note: ""
      D4-5:                    # 可观测性: 有无客流设备? 老板能说出前5单品?
        score:                 # 访谈→C级
        evidence:
        note: ""

  D5:   # 财务健康 · 基础权重15 · 周转超账期=现金流硬红线(A/B级证据才触发P0)
    items:
      D5-1:                    # 综合毛利率: 基准20-25%; 生鲜进价虚高需口径警示
        score:
        evidence:
        note: ""
      D5-2:                    # 综合周转天数: 必须<结算周期30-45天; ⚠ERP进价不准→C级,
        score:                 #   须真实进货单据(B级)才可触发P0进TOP3(§3 D5⑤三档)
        evidence:
        note: ""
      D5-3:                    # GMROI: 毛利额÷平均库存, 健康≥2.5
        score:
        evidence:
        note: ""
      D5-4:                    # 库存坪效: 月销售额÷卖场面积
        score:
        evidence:
        note: ""
      D5-5:                    # 盈亏平衡: 保本销售额=固定成本÷毛利率; 老板估算可接受(C级)
        score:
        evidence:
        note: ""

  D6:   # 人员运营 · 基础权重10(夫妻店置0/灰区5) · ⚠整维证据上限通常C
    items:
      D6-1:                    # 人工成本占比: 基准8-12%; 老板估算月工资总额÷月销→C级
        score:
        evidence:
        note: ""
      D6-2:                    # 关键岗位技能: 生鲜加工(剁肉/切配/叶菜打理)+收银+陈列各有合格人?
        score:                 # 现场可核→B级
        evidence:
        note: ""
      D6-3:                    # 人员成本效率: 销售额÷人工总成本
        score:
        evidence:
        note: ""
      D6-4:                    # 排班合理性: 有无单点依赖(一人请假即瘫)? 排班公平?
        score:
        evidence:
        note: ""
      D6-5:                    # 人员稳定性: 近6月流失率/在职平均时长(老板访谈→C级)
        score:
        evidence:
        note: ""

  D7:   # 顾客体验 · 基础权重5 · ⚠证据上限通常C/D, 禁写"复购率X%"类精确结论
    items:
      D7-1:                    # 复购代理: 活跃会员占比/复购率(多数店无→留空)
        score:
        evidence:
        note: ""
      D7-2:                    # 服务质量: 收银速度/态度/生鲜加工服务/称重纠纷(现场→B级)
        score:
        evidence:
        note: ""
      D7-3:                    # 称重诚信: 缺斤少两投诉/价签与POS一致性抽检
        score:                 # 称重诚信问题=社区店致命P0
        evidence:
        note: ""
      D7-4:                    # 口碑代理: 美团/点评评分/社群活跃度(C级)
        score:
        evidence:
        note: ""
      D7-5:                    # 熟客关系: 老板能叫出几位常客名字及偏好(C/D级)
        score:
        evidence:
        note: ""
