<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>蒙特梭利幼小衔接海报方向稿</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 36px;
      background: #eee8de;
      color: #25231f;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }
    header {
      max-width: 1280px;
      margin: 0 auto 28px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid rgba(37,35,31,.18);
      padding-bottom: 22px;
    }
    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      margin: 8px 0 0;
      color: #6b6258;
      font-size: 16px;
      line-height: 1.5;
    }
    .grid {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }
    article {
      background: #fffaf2;
      border: 1px solid rgba(37,35,31,.14);
      padding: 16px;
    }
    img {
      width: 100%;
      display: block;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border: 1px solid rgba(37,35,31,.12);
    }
    h2 {
      margin: 16px 0 6px;
      font-size: 20px;
      line-height: 1.25;
    }
    .note {
      min-height: 48px;
      color: #5f574f;
      font-size: 14px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    a {
      color: #1e4d3e;
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1px solid currentColor;
    }
    @media (max-width: 980px) {
      header { display: block; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>蒙特梭利幼小衔接海报方向稿</h1>
      <p>规格：1080×1440，适合朋友圈、微信群。当前二维码、电话、地址为占位，未编造真实信息。</p>
    </div>
  </header>

  <main class="grid">
    <article>
      <img src="variant-a-高级说明卡.png" alt="A版高级说明卡">
      <h2>A｜高级说明卡</h2>
      <div class="note">最稳妥，适合朋友圈长期发布，专业感和信任感更强。</div>
      <div class="links"><a href="variant-a-高级说明卡.png">PNG</a><a href="variant-a-高级说明卡.html">HTML</a></div>
    </article>

    <article>
      <img src="variant-b-测评邀请卡.png" alt="B版测评邀请卡">
      <h2>B｜测评邀请卡</h2>
      <div class="note">转化感最强，适合微信群发和私聊转发，直接推动预约测评。</div>
      <div class="links"><a href="variant-b-测评邀请卡.png">PNG</a><a href="variant-b-测评邀请卡.html">HTML</a></div>
    </article>

    <article>
      <img src="variant-c-能力地图卡.png" alt="C版能力地图卡">
      <h2>C｜能力地图卡</h2>
      <div class="note">课程体系解释最清楚，适合家长需要理解课程价值时发送。</div>
      <div class="links"><a href="variant-c-能力地图卡.png">PNG</a><a href="variant-c-能力地图卡.html">HTML</a></div>
    </article>

    <article>
      <img src="variant-d-open-design-排版优化.png" alt="D版Open Design排版优化">
      <h2>D｜Open Design 排版优化</h2>
      <div class="note">参考 Open Design 的暖纸感、编辑部大字排版和真实二维码，文字层级最强。</div>
      <div class="links"><a href="variant-d-open-design-排版优化.png">PNG</a><a href="variant-d-open-design-排版优化.html">HTML</a></div>
    </article>
  </main>
</body>
</html>
